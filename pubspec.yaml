name: asf_futo
description: ASF FUTO Chapter - Adventist Student Fellowship App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.15.3
  cloud_firestore: ^4.14.0
  firebase_storage: ^11.6.0
  firebase_messaging: ^14.7.9

  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Navigation
  go_router: ^13.0.0

  # Media & Audio
  record: ^6.0.0
  just_audio: ^0.9.46
  image_picker: ^1.0.7

  # Notifications
  flutter_local_notifications: ^17.2.4

  # UI
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.9
  lottie: ^3.0.0

  # Utils
  geolocator: ^11.1.0
  intl: ^0.19.0
  shared_preferences: ^2.2.2
  connectivity_plus: ^6.0.2
  uuid: ^4.3.3
  timeago: ^3.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

dependency_overrides:
  record: ^6.2.0
  record_linux: ^1.3.0
  record_platform_interface: ^1.5.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/
    - assets/bible/
    - assets/hymnal/

  fonts:
    - family: Gabarito
      fonts:
        - asset: assets/fonts/Gabarito-Regular.ttf
        - asset: assets/fonts/Gabarito-Bold.ttf
          weight: 700
        - asset: assets/fonts/Gabarito-Medium.ttf
          weight: 500
    - family: DMSans
      fonts:
        - asset: assets/fonts/DMSans_18pt-Regular.ttf
        - asset: assets/fonts/DMSans_36pt-Medium.ttf
          weight: 500
        - asset: assets/fonts/DMSans_18pt-Bold.ttf
          weight: 700